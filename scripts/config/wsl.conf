# Copy file ini ke dalam WSL: /etc/wsl.conf (sesuaikan path repo), contoh:
#   sudo cp /mnt/c/Dev/lokalan/panel/scripts/config/wsl.conf /etc/wsl.conf
# Lalu restart WSL: wsl --shutdown

[boot]
# systemd wajib agar nginx & php-fpm autostart via systemctl
systemd=true

[automount]
enabled=true
# metadata = izinkan chmod/chown di /mnt/c (berguna untuk permission)
options="metadata"

[network]
generateResolvConf=true
