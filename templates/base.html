<!doctype html>
<html lang="id" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lokalan — Lokal Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@1.9.12/dist/htmx.min.js"></script>
  <style>
    body { max-width: 1100px; margin: 0 auto; }
    .mono { font-family: Consolas, monospace; font-size: .85rem; }
    pre.logbox { max-height: 320px; overflow: auto; background: #0d1117; padding: 1rem; border-radius: .5rem; }
    .htmx-request { opacity: .6; }
  </style>
</head>
<body class="p-4">
  <div class="d-flex align-items-center mb-4">
    <a href="/" class="text-decoration-none text-body">
      <h4 class="mb-0"><i class="ti ti-server me-1"></i>Lokalan</h4>
      <span class="text-secondary small">monitor server lokal</span>
    </a>
    <a href="/php" title="Pengaturan PHP (php.ini)"
       class="ms-auto text-secondary fs-4 d-flex align-items-center me-3 text-decoration-none">
      <i class="ti ti-brand-php"></i>
    </a>
    <a href="/settings" title="Pengaturan (panel.ini)"
       class="text-secondary fs-4 d-flex align-items-center me-3 text-decoration-none">
      <i class="ti ti-settings"></i>
    </a>
    <a href="/readme" target="_blank" rel="noopener" title="Help / About"
       class="text-secondary fs-4 d-flex align-items-center text-decoration-none">
      <i class="ti ti-help-circle"></i>
    </a>
  </div>
  {% block content %}{% endblock %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
